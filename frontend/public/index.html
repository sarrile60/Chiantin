<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
        <meta name="theme-color" content="#dc3545" />
        <meta name="description" content="Chiantin - Professional EU digital banking platform with multi-currency accounts, instant transfers, and bank-grade security" />
        
        <!-- PWA Manifest - Critical for standalone mode -->
        <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials" />
        
        <!-- iOS Web Clip / Safari PWA -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Chiantin" />
        <link rel="apple-touch-icon" href="/icons/icon-192.png" />
        <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
        <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
        
        <!-- Mobile Chrome styling -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="application-name" content="Chiantin" />
        
        <!-- MS Tile for Windows -->
        <meta name="msapplication-TileColor" content="#dc3545" />
        <meta name="msapplication-TileImage" content="/icons/icon-192.png" />
        
        <title>Chiantin - Digital Banking</title>
        <script src="https://assets.emergent.sh/scripts/emergent-main.js"></script>
        <!--
        These two scripts have been added for the Visual Edits, please do not edit or remove them
        -->
        <script>
            // Only load visual edit scripts when inside an iframe
            if (window.self !== window.top) {
                // Load debug monitor script
                var debugMonitorScript = document.createElement('script');
                debugMonitorScript.src = 'https://assets.emergent.sh/scripts/debug-monitor.js';
                document.head.appendChild(debugMonitorScript);

                // Configure Tailwind
                window.tailwind = window.tailwind || {};
                tailwind.config = {
                    corePlugins: { preflight: false },
                };

                // Load Tailwind CDN
                var tailwindScript = document.createElement('script');
                tailwindScript.src = 'https://cdn.tailwindcss.com';
                document.head.appendChild(tailwindScript);
            }
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
